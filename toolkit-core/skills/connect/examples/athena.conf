// Amazon Athena connection + datasource for the phData Toolkit CLI.
// Driver (NOT bundled): athena-jdbc-<version>-with-dependencies.jar in the project's lib/ directory.
// Download: https://docs.aws.amazon.com/athena/latest/ug/connect-with-jdbc.html
//
// Export before running toolkit commands:
//   ATHENA_REGION     e.g. us-east-2
//   ATHENA_S3_OUTPUT  query results bucket, e.g. s3://my-bucket/athena-results/
//   ATHENA_SCHEMA     Glue database to default to
// AWS credentials come from the default chain (env vars, SSO profile, instance role) —
// make sure `aws sts get-caller-identity` works in the same shell.

// Convention: the connection and the datasource share the same name — rename both together.

connections {
  my_athena {
    url = "jdbc:athena://athena."${ATHENA_REGION}".amazonaws.com:443;OutputLocation="${ATHENA_S3_OUTPUT}";Catalog=AwsDataCatalog;Schema="${ATHENA_SCHEMA}";CredentialsProvider=DefaultChain"
  }
}

ds {
  datasources {
    my_athena {
      connection = ${connections.my_athena}
      // Optional: scope ds commands to specific databases, e.g.
      // filters { patterns = [ "awsdatacatalog.my_database.*" ] }
    }
  }
}
