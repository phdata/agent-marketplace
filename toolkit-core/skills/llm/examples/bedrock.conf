// Amazon Bedrock LLM client for the phData Toolkit CLI.
//
// phData consultants get Bedrock access automatically (the toolkit auth flow brokers it
// when no llmClient block is set) — but add this block anyway: with no block, the request
// and socket timeouts fall back to short AWS SDK defaults, and long-running agent calls
// (e.g. pipeline-build judge loops) can exceed them. 1000s is the recommended default.
//
// Credentials: AWS default chain (env vars, SSO profile, instance role). Verify with
// `aws sts get-caller-identity` in the same shell. Not needed on the phData auth flow.

llmClient {
  type = AmazonBedrock
  model = "global.anthropic.claude-sonnet-4-6"
  requestTimeout = 1000s
  socketTimeout = 1000s
}
