// PostgreSQL connection + datasource for the phData Toolkit CLI.
// Driver (NOT bundled): postgresql-<version>.jar in the project's lib/ directory.
// Download: https://jdbc.postgresql.org/download/
//
// Export before running toolkit commands:
//   PG_HOST      hostname
//   PG_DATABASE  database name
//   PG_USER      login
//   PG_PASSWORD  password

connections {
  my_postgres {
    url = "jdbc:postgresql://"${PG_HOST}":5432/"${PG_DATABASE}
    username = ${PG_USER}
    password = ${PG_PASSWORD}
  }
}

ds {
  datasources {
    my_postgres {
      connection = ${connections.my_postgres}
      filters { patterns = [ "my_database.public.*" ] }
    }
  }
}
