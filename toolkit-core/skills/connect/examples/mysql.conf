// MySQL connection + datasource for the phData Toolkit CLI.
// Driver (NOT bundled): mysql-connector-j-<version>.jar in the project's lib/ directory.
// Download: https://dev.mysql.com/downloads/connector/j/
//
// Export before running toolkit commands:
//   MYSQL_HOST      hostname
//   MYSQL_DATABASE  schema/database name
//   MYSQL_USER      login
//   MYSQL_PASSWORD  password

// Convention: the connection and the datasource share the same name — rename both together.

connections {
  my_mysql {
    url = "jdbc:mysql://"${MYSQL_HOST}":3306/"${MYSQL_DATABASE}
    username = ${MYSQL_USER}
    password = ${MYSQL_PASSWORD}
  }
}

ds {
  datasources {
    my_mysql {
      connection = ${connections.my_mysql}
      // Optional: scope ds commands to specific databases (MySQL has no separate
      // schema layer), e.g.
      // filters { patterns = [ "my_database.*" ] }
    }
  }
}
