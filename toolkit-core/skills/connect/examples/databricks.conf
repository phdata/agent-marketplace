// Databricks connection + datasource for the phData Toolkit CLI.
// Driver (NOT bundled): DatabricksJDBC.jar in the project's lib/ directory.
// Download: https://www.databricks.com/spark/jdbc-drivers-download
//
// Export before running toolkit commands:
//   DATABRICKS_HOST       workspace host, e.g. dbc-xxxxxxxx-yyyy.cloud.databricks.com
//   DATABRICKS_HTTP_PATH  SQL warehouse path, e.g. /sql/1.0/warehouses/<id>
//   DATABRICKS_CATALOG    Unity Catalog name
//   DATABRICKS_TOKEN      personal access token (AuthMech=3 uses token auth)

connections {
  my_databricks {
    url = "jdbc:databricks://"${DATABRICKS_HOST}":443/default;transportMode=http;ssl=1;AuthMech=3;httpPath="${DATABRICKS_HTTP_PATH}";ConnCatalog="${DATABRICKS_CATALOG}
    properties {
      UID = "token"
      PWD = ${DATABRICKS_TOKEN}
    }
  }
}

ds {
  datasources {
    my_databricks {
      connection = ${connections.my_databricks}
      filters { patterns = [ "my_catalog.my_schema.*" ] }
    }
  }
}
