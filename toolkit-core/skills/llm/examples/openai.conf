// OpenAI LLM client for the phData Toolkit CLI.
//
// Export before running toolkit commands:
//   OPENAI_API_KEY  your OpenAI API key
// The apiKey line may also be omitted entirely — the client falls back to reading
// OPENAI_API_KEY from the environment. The url can point at any OpenAI-compatible
// chat-completions endpoint.

llmClient {
  type = openai
  model = "gpt-4.1-2025-04-14"         // any chat-completions model id
  url = "https://api.openai.com/v1"
  apiKey = ${OPENAI_API_KEY}
  requestTimeout = 60s
  retryThreshold = 3
}
