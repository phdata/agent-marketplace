// Anthropic LLM client for the phData Toolkit CLI.
//
// Export before running toolkit commands:
//   ANTHROPIC_API_KEY  your Anthropic API key
// The apiKey line may also be omitted entirely — the client falls back to reading
// ANTHROPIC_API_KEY from the environment.

llmClient {
  type = anthropic
  model = "claude-sonnet-4-6"          // any current Anthropic model id
  url = "https://api.anthropic.com"
  apiKey = ${ANTHROPIC_API_KEY}
  retryThreshold = 3
}
