# Dataspec: dbt model on Snowflake, DDL-format spec (paste the target DDL and
# annotate intent with business rules).
tooling: dbt
targetPlatform: snowflake
dbtProfile: snowflake_profile
materialization: incremental
format: ddl
loadStrategy:
  type: incremental_merge
content: |
  Target table: mart.customer_basics

  CREATE TABLE mart.customer_basics (
      customer_id NUMBER(38, 0) NOT NULL,
      customer_name VARCHAR(1000),
      most_common_menu_type VARCHAR(1000),
      count_lifetime_orders INT,
      first_ordered_at DATETIME,
      lifetime_spend NUMBER(20, 4)
  );

  Business Rules:
  BR-01: customer_id — natural key from the raw customer table (grain: one row per customer)
  BR-02: customer_name — first and last name concatenated
  BR-03: most_common_menu_type — most frequent menu_type across the customer's orders
  BR-04: count_lifetime_orders — count of the customer's orders
  BR-05: first_ordered_at — datetime of the customer's first order
  BR-06: lifetime_spend — total spend including tax across all items
context: |
  Source system: Jaffle customer loyalty system.
  All data landed in Snowflake in database DEMO_DB, schema RAW_POS.
