// Oracle connection + datasource for the phData Toolkit CLI.
// Driver (NOT bundled): ojdbc11.jar (or ojdbc8.jar for older JVMs) in the project's lib/ directory.
// Download: https://www.oracle.com/database/technologies/appdev/jdbc-downloads.html
//
// Export before running toolkit commands:
//   ORACLE_HOST      hostname
//   ORACLE_SERVICE   service name (use SID syntax jdbc:oracle:thin:@host:1521:SID if needed)
//   ORACLE_USER      login
//   ORACLE_PASSWORD  password

// Convention: the connection and the datasource share the same name — rename both together.

connections {
  my_oracle {
    url = "jdbc:oracle:thin:@//"${ORACLE_HOST}":1521/"${ORACLE_SERVICE}
    username = ${ORACLE_USER}
    password = ${ORACLE_PASSWORD}
  }
}

ds {
  datasources {
    my_oracle {
      connection = ${connections.my_oracle}
      // Optional: scope ds commands to specific schemas (Oracle scoping is schema-first;
      // the database segment matches the service/instance), e.g.
      // filters { patterns = [ "*.MY_SCHEMA.*" ] }
    }
  }
}
