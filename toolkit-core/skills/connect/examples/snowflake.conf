// Snowflake connection + datasource for the phData Toolkit CLI.
// Driver: bundled with the toolkit — nothing to install.
//
// Export before running toolkit commands:
//   SNOWFLAKE_ACCOUNT           e.g. my_org-my_account
//   SNOWFLAKE_USER              Snowflake login name
//   SNOWFLAKE_ROLE              role to use
//   SNOWFLAKE_WAREHOUSE         warehouse to bill work to
//   SNOWFLAKE_PRIVATE_KEY_PATH  absolute path to the user's .p8/.pem private key
//   (password auth instead: SNOWFLAKE_PASSWORD — see properties below)

// Convention: the connection and the datasource share the same name — rename both together.

connections {
  my_snowflake {
    url = "jdbc:snowflake://"${SNOWFLAKE_ACCOUNT}".snowflakecomputing.com"
    properties {
      user = ${SNOWFLAKE_USER}
      role = ${SNOWFLAKE_ROLE}
      warehouse = ${SNOWFLAKE_WAREHOUSE}
      // Keypair auth (recommended):
      private_key_file = ${SNOWFLAKE_PRIVATE_KEY_PATH}
      // Password auth instead: remove private_key_file and use
      // password = ${SNOWFLAKE_PASSWORD}
    }
  }
}

ds {
  datasources {
    my_snowflake {
      connection = ${connections.my_snowflake}
      // Scope every ds command to what this work actually touches.
      filters { patterns = [ "MY_DB.MY_SCHEMA.*" ] }
    }
  }
}
