// SQL Server connection + datasource for the phData Toolkit CLI.
// Driver (NOT bundled): mssql-jdbc-<version>.jre11.jar in the project's lib/ directory.
// Download: https://learn.microsoft.com/sql/connect/jdbc/download-microsoft-jdbc-driver-for-sql-server
//
// Export before running toolkit commands:
//   MSSQL_HOST       hostname (add ",<port>" in the url if not 1433)
//   MSSQL_DATABASE   database name
//   MSSQL_USER       login
//   MSSQL_PASSWORD   password

// Convention: the connection and the datasource share the same name — rename both together.

connections {
  my_sqlserver {
    url = "jdbc:sqlserver://"${MSSQL_HOST}":1433;databaseName="${MSSQL_DATABASE}";encrypt=true;trustServerCertificate=true"
    username = ${MSSQL_USER}
    password = ${MSSQL_PASSWORD}
  }
}

ds {
  datasources {
    my_sqlserver {
      connection = ${connections.my_sqlserver}
      // Optional: scope ds commands to specific databases/schemas, e.g.
      // filters { patterns = [ "MY_DB.dbo.*" ] }
    }
  }
}
