// Hive connection + datasource for the phData Toolkit CLI.
// Driver (NOT bundled): hive-jdbc-<version>-standalone.jar in the project's lib/ directory.
// Ships with your Hive/CDP distribution, or from Maven Central (org.apache.hive:hive-jdbc, standalone classifier).
//
// Export before running toolkit commands:
//   HIVE_HOST      HiveServer2 hostname
//   HIVE_USER      login
//   HIVE_PASSWORD  password (Kerberos clusters need principal/keytab URL params instead —
//                  see your cluster's HiveServer2 JDBC string)

connections {
  my_hive {
    url = "jdbc:hive2://"${HIVE_HOST}":10000/default"
    username = ${HIVE_USER}
    password = ${HIVE_PASSWORD}
  }
}

ds {
  datasources {
    my_hive {
      connection = ${connections.my_hive}
      filters { patterns = [ "my_database.*" ] }
    }
  }
}
