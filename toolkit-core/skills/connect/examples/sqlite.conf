// SQLite connection + datasource for the phData Toolkit CLI.
// Driver: bundled with the toolkit — nothing to install.
// No credentials needed; great for local testing and trying out toolkit workflows
// end to end without a warehouse account.
//
// Export before running toolkit commands:
//   SQLITE_DB_PATH  absolute path to the .db / .sqlite file

connections {
  my_sqlite {
    url = "jdbc:sqlite:"${SQLITE_DB_PATH}
  }
}

ds {
  datasources {
    my_sqlite {
      connection = ${connections.my_sqlite}
      // SQLite is a single database; scope by table pattern if needed.
      filters { patterns = [ "*.*.*" ] }
    }
  }
}
