// Amazon Bedrock LLM client for the phData Toolkit CLI.
//
// phData consultants usually need NO llmClient block at all — with none configured the
// toolkit falls back to Bedrock and the phData auth flow brokers access. Add this block
// only to pin a specific model/timeouts or to use your own AWS account's Bedrock access.
//
// Credentials: AWS default chain (env vars, SSO profile, instance role). Verify with
// `aws sts get-caller-identity` in the same shell.

llmClient {
  type = AmazonBedrock
  model = "global.anthropic.claude-sonnet-4-6"
  requestTimeout = 1000s
  socketTimeout = 1000s
}
